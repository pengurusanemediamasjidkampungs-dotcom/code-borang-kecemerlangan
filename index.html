<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borang Pendaftaran Multi-Step</title>
  <style>
    :root {
      --primary: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --bg: #f1f5f9;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .form-container {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
    }

    .form-step { display: none; }
    .form-step.active { display: block; }

    h2 { margin-bottom: 1.5rem; color: #1e293b; font-size: 1.5rem; }

    .input-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
      color: #475569;
      font-size: 0.9rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:active { transform: scale(0.98); }

    #btnPrev { background-color: #cbd5e1; color: #475569; }
    #btnNext { background-color: var(--primary); color: white; }

    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="form-container">
  <form id="mainForm">
    <div class="form-step active">
      <h2>Maklumat Asas 👤</h2>
      <div class="input-group">
        <label>Nama Penuh (Wajib)</label>
        <input type="text" name="Nama" required placeholder="Ali Bin Abu">
      </div>
      <div class="input-group">
        <label>No. Kad Pengenalan (Wajib - 12 Digit)</label>
        <input type="number" id="ic" name="IC" required placeholder="900101015566">
      </div>
    </div>

    <div class="form-step">
      <h2>Hubungi Kami 📞</h2>
      <div class="input-group">
        <label>No. Telefon (Wajib)</label>
        <input type="number" id="telefon" name="Telefon" required placeholder="0123456789">
      </div>
      <div class="input-group">
        <label>Emel</label>
        <input type="email" name="Email" placeholder="ali@example.com">
      </div>
    </div>

    <div class="form-step">
      <h2>Pengesahan ✅</h2>
      <p style="color: #64748b; font-size: 0.9rem;">Sila pastikan semua maklumat adalah betul sebelum menghantar borang ini.</p>
      <div class="input-group">
        <label>Catatan</label>
        <textarea name="Catatan" rows="3"></textarea>
      </div>
    </div>

    <div class="button-group">
      <button type="button" id="btnPrev" onclick="prev()">Kembali ⬅</button>
      <button type="button" id="btnNext" onclick="next()">Next ➡</button>
    </div>
  </form>
</div>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbyDo_nNimiTUcuyKNGa0cZyq9WPgSZUMhHUc8HSjZHiym8zZHMAJSCQRDluFTdvm65d/exec';
  const form = document.getElementById('mainForm');
  const steps = document.querySelectorAll(".form-step");
  const btnPrev = document.getElementById("btnPrev");
  const btnNext = document.getElementById("btnNext");
  let step = 0;

  function showStep() {
    steps.forEach((s, index) => {
      s.classList.toggle("active", index === step);
    });

    // PEMBETULAN: Logik sorok butang Prev
    btnPrev.style.visibility = (step === 0) ? 'hidden' : 'visible';

    // Tukar teks butang Next
    if (step === steps.length - 1) {
      btnNext.innerText = "Hantar ✅";
    } else {
      btnNext.innerText = "Next ➡";
    }
  }

  function validateField(el) {
    let valid = true;
    let value = el.value.trim();

    // Check required
    if (el.hasAttribute('required') && value === '') {
      valid = false;
    } else if (value !== '') {
      // Check format spesifik
      if (el.id === 'ic' && value.length !== 12) valid = false;
      if (el.id === 'telefon' && value.length < 9) valid = false;
      if (el.type === 'email' && !value.includes('@')) valid = false;
    }

    // PEMBETULAN: Visual feedback yang konsisten
    if (!valid) {
      el.style.outline = '2px solid var(--error)';
      el.style.borderColor = 'transparent';
    } else if (valid && value !== '') {
      el.style.outline = '2px solid var(--success)';
      el.style.borderColor = 'transparent';
    } else {
      el.style.outline = 'none';
      el.style.borderColor = '#e2e8f0';
    }
    return valid;
  }

  function validateStep() {
    const currentInputs = steps[step].querySelectorAll('input, select, textarea');
    let stepValid = true;

    currentInputs.forEach(el => {
      if (!validateField(el)) stepValid = false;
    });

    if (!stepValid) {
      alert('⚠️ Sila betulkan maklumat yang bertanda merah.');
    }
    return stepValid;
  }

  function next() {
    if (!validateStep()) return;

    if (step < steps.length - 1) {
      step++;
      showStep();
    } else {
      submitToGAS();
    }
  }

  function prev() {
    if (step > 0) {
      step--;
      showStep();
    }
  }

  function submitToGAS() {
    btnNext.innerText = "Sedang Hantar... ⏳";
    btnNext.disabled = true;

    fetch(scriptURL, { method: 'POST', body: new FormData(form) })
      .then(response => {
        alert('✅ Tahniah! Data telah berjaya disimpan.');
        form.reset();
        step = 0;
        showStep();
        document.querySelectorAll('input, select, textarea').forEach(el => el.style.outline = 'none');
      })
      .catch(error => {
        alert('❌ Ralat! Sila cuba lagi atau semak sambungan internet.');
        console.error('Error!', error.message);
      })
      .finally(() => {
        btnNext.disabled = false;
        btnNext.innerText = "Hantar ✅";
      });
  }

  // Real-time validation listeners
  document.querySelectorAll('input, select, textarea').forEach(el => {
    el.addEventListener('input', () => validateField(el));
  });

  // Init
  showStep();
</script>

</body>
</html>
